# wrangler.toml
# Deploy  : npx wrangler deploy
# Dev     : npx wrangler dev
# Secrets : npx wrangler secret put RESEND_API_KEY

name               = "fauzan-portfolio-api"
main               = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── KV Namespace untuk rate limiting ─────────────────────────
# Buat dulu: npx wrangler kv namespace create RATE_LIMIT
# Lalu copy id-nya ke sini
[[kv_namespaces]]
binding = "RATE_LIMIT"
id      = "GANTI_DENGAN_KV_ID_KAMU"

# ── Environment variables (non-secret) ───────────────────────
[vars]
ENVIRONMENT    = "production"
ALLOWED_ORIGIN = "https://fauzandwip.pages.dev"

# ── Secrets (set via CLI, JANGAN tulis di sini) ───────────────
# npx wrangler secret put RESEND_API_KEY
# npx wrangler secret put OWNER_EMAIL
# npx wrangler secret put EMAIL_DOMAIN
# npx wrangler secret put IP_SALT
# npx wrangler secret put CV_URL
